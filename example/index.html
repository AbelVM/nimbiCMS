<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>NimbiCMS</title>
  <style>
    html,
    body {
      height: 100%;
      margin: 0;
    }

    body {
      background: #000000;
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      grid-template-rows: 1fr 75vh 1fr;
    }

    #header,
    #footer {
      grid-column: 1 / -1;
      color: #ffffff;
      padding: 0.5rem 1rem;
    }

    #header {
      grid-row: 1;
      background: #1e88ff;
    }

    #footer {
      grid-row: 3;
      background: #e53935;
    }

    #app {
      grid-column: 2;
      grid-row: 2;
      width: 75vw;
      height: 75vh;
      justify-self: center;
      align-self: center;
      box-sizing: border-box;
    }
  </style>
  <link rel="preload" href="/dist/nimbi-cms.css" as="style" onload="this.rel='stylesheet'">
  <noscript><link rel="stylesheet" href="/dist/nimbi-cms.css"></noscript>
</head>

<body>
  <div id="header">Header</div>
  <div id="app"></div>
  <div id="footer">Footer</div>
  <script type="module">
    import initCMS from '/dist/nimbi-cms.js';
    const contentPath = './content';
    initCMS({ el: '#app', contentPath})
      .catch(e => console.error('initCMS failed', e));
  </script>
</body>

</html>
