<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>nimbiCMS</title>
  <meta name="description" content="nimbiCMS — client-side Markdown CMS">

  <meta property="og:title" content="nimbiCMS">
  <meta property="og:description" content="nimbiCMS — client-side Markdown CMS">
  <meta property="og:type" content="website">
  <meta property="og:image" content="https://abelvm.github.io/nimbiCMS/assets/logo.png">

  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="nimbiCMS">
  <meta name="twitter:description" content="nimbiCMS — client-side Markdown CMS">
  <meta name="twitter:image" content="https://abelvm.github.io/nimbiCMS/assets/logo.png">

  <link rel="icon" href="./assets/logo.png">
  <style>
    html,
    body,
    #app {
      height: 100vh;
      max-height: 100vh;
      margin: 0;
      display: block;
    }
  </style>
  <link rel="preload" href="./dist/nimbi-cms.css" as="style" onload="this.rel='stylesheet'">
  <noscript>
    <link rel="stylesheet" href="./dist/nimbi-cms.css">
  </noscript>
</head>

<body>
  <div id="app"></div>

  <script src="./dist/nimbi-cms.js" defer></script>
  <script defer>
    window.__nimbiCMSDebug = false
    window.addEventListener('DOMContentLoaded', function () {
      if (!window.nimbiCMS) {
        console.warn('nimbiCMS UMD bundle not found at /dist/nimbi-cms.js');
        return;
      }
      try {
        nimbiCMS.initCMS({
          el: '#app',
          contentPath: './',
          indexDepth: 3,
          bulmaCustomize: 'materia',
          homePage: 'assets/brochure.md',/* 
          notFoundPage: 'assets/404.md', */
          navigationPage: 'assets/navigation.md',
        });
      } catch (e) {
        console.error('[index.html] initCMS failed', e);
      }
    });
  </script>
</body>

</html>
